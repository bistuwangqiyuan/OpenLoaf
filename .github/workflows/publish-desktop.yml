name: Publish Desktop

on:
  push:
    tags:
      - 'desktop@*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Release channel'
        required: false
        default: 'stable'
        type: choice
        options:
          - stable
          - beta
      build_mac:
        description: 'Build macOS'
        required: false
        default: true
        type: boolean
      build_windows:
        description: 'Build Windows'
        required: false
        default: true
        type: boolean
      build_linux:
        description: 'Build Linux'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: desktop-publish-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash -euo pipefail {0}

env:
  ELECTRON_CACHE: ${{ github.workspace }}/.cache/electron
  ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.cache/electron-builder

jobs:
  # ---------------------------------------------------------------------------
  # 解析版本号和发布渠道（beta / stable）
  # ---------------------------------------------------------------------------
  determine-mode:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      channel: ${{ steps.resolve.outputs.channel }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and channel
        id: resolve
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/desktop@}"
          else
            # workflow_dispatch：从 package.json 读取
            VERSION=$(node -p "require('./apps/desktop/package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$VERSION" == *"-beta"* ]]; then
            echo "channel=beta" >> $GITHUB_OUTPUT
            echo "🔵 Channel: beta — $VERSION"
          else
            echo "channel=stable" >> $GITHUB_OUTPUT
            echo "🟢 Channel: stable — $VERSION"
          fi

  build-prerequisites:
    needs: determine-mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Use HTTPS for git dependencies
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter desktop... --filter server...

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Build workspace packages
        run: pnpm --filter @openloaf/widget-sdk run build

      - name: Build server
        run: pnpm --filter server run build:prod

      - name: Build web
        env:
          NEXT_PUBLIC_SERVER_URL: http://127.0.0.1:23333
          NEXT_PUBLIC_OPENLOAF_SAAS_URL: https://openloaf.hexems.com
          NEXT_PUBLIC_UPDATE_BASE_URL: https://r2-openloaf-update.hexems.com
        run: pnpm --filter web run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openloaf-build
          path: |
            apps/server/dist/server.mjs
            apps/server/dist/seed.db
            apps/web/out

  # ---------------------------------------------------------------------------
  # macOS ARM64（Apple Silicon）
  # ---------------------------------------------------------------------------
  build-mac-arm64:
    needs: [determine-mode, build-prerequisites]
    if: github.event_name == 'push' || inputs.build_mac
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Use HTTPS for git dependencies
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter desktop... --filter server...

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: openloaf-build
          path: apps

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/desktop@}"
          cd apps/desktop
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "Set desktop version to $TAG_VERSION"

      - name: Build and package desktop (macOS ARM64)
        working-directory: apps/desktop
        env:
          CSC_LINK: ${{ secrets.MAC_CER_BASE64 }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CER_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: pnpm run dist:mac:ci

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openloaf-desktop-macos-arm64
          path: |
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.dmg.blockmap
            apps/desktop/dist/*.zip
            apps/desktop/dist/*.zip.blockmap
            apps/desktop/dist/latest-mac.yml

      # 构建完成后立即上传到 R2（不等待其他平台）
      - name: Install publish dependencies
        run: |
          cd scripts/shared
          npm init -y > /dev/null 2>&1
          npm install @aws-sdk/client-s3

      - name: Upload to R2 (immediate, per-build)
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node apps/desktop/scripts/publish-update.mjs --skip-build --upload-only --platform=mac-arm64

      - name: Upload platform metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: openloaf-platform-meta-arm64
          path: apps/desktop/dist/platform-meta-mac-arm64.json

  # ---------------------------------------------------------------------------
  # Windows
  # ---------------------------------------------------------------------------
  build-windows:
    needs: [determine-mode, build-prerequisites]
    if: github.event_name == 'push' || inputs.build_windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Use HTTPS for git dependencies
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter desktop... --filter server...

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: openloaf-build
          path: apps

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/desktop@}"
          cd apps/desktop
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "Set desktop version to $TAG_VERSION"

      - name: Build and package desktop (Windows)
        working-directory: apps/desktop
        run: pnpm run dist:win:ci

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openloaf-desktop-windows
          path: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.exe.blockmap
            apps/desktop/dist/latest.yml

      # 构建完成后立即上传到 R2（不等待其他平台）
      - name: Install publish dependencies
        run: |
          cd scripts/shared
          npm init -y > /dev/null 2>&1
          npm install @aws-sdk/client-s3

      - name: Upload to R2 (immediate, per-build)
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node apps/desktop/scripts/publish-update.mjs --skip-build --upload-only --platform=win-x64

      - name: Upload platform metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: openloaf-platform-meta-win
          path: apps/desktop/dist/platform-meta-win-x64.json

  # ---------------------------------------------------------------------------
  # Linux
  # ---------------------------------------------------------------------------
  build-linux:
    needs: [determine-mode, build-prerequisites]
    if: github.event_name == 'push' || inputs.build_linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-store-${{ runner.os }}-${{ runner.arch }}-

      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/electron
            ${{ github.workspace }}/.cache/electron-builder
          key: electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('apps/desktop/package.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Use HTTPS for git dependencies
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --filter desktop... --filter server...

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: openloaf-build
          path: apps

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/desktop@}"
          cd apps/desktop
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version
          echo "Set desktop version to $TAG_VERSION"

      - name: Build and package desktop (Linux)
        working-directory: apps/desktop
        run: pnpm run dist:linux:ci

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openloaf-desktop-linux
          path: |
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/latest-linux.yml

      # 构建完成后立即上传到 R2（不等待其他平台）
      - name: Install publish dependencies
        run: |
          cd scripts/shared
          npm init -y > /dev/null 2>&1
          npm install @aws-sdk/client-s3

      - name: Upload to R2 (immediate, per-build)
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node apps/desktop/scripts/publish-update.mjs --skip-build --upload-only --platform=linux-x64

      - name: Upload platform metadata artifact
        uses: actions/upload-artifact@v4
        with:
          name: openloaf-platform-meta-linux
          path: apps/desktop/dist/platform-meta-linux-x64.json

  # ---------------------------------------------------------------------------
  # 收尾步骤：上传 changelogs + 清理旧版本（各平台已各自写 manifest）
  # ---------------------------------------------------------------------------
  publish-finalize:
    needs: [determine-mode, build-mac-arm64, build-windows, build-linux]
    if: always() && contains(needs.*.result, 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install publish dependencies
        run: |
          cd scripts/shared
          npm init -y > /dev/null 2>&1
          npm install @aws-sdk/client-s3

      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/desktop@}"
          cd apps/desktop
          npm version "$TAG_VERSION" --no-git-tag-version --allow-same-version

      # 下载各平台元数据作为兜底（R2 manifest 已由各平台各自写入，这里合并确保完整性）
      - name: Download platform metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openloaf-platform-meta-*
          path: apps/desktop/dist
          merge-multiple: true
        continue-on-error: true

      - name: List downloaded metadata
        run: ls -la apps/desktop/dist/platform-meta-*.json 2>/dev/null || echo "(no local metadata files, relying on R2 manifest)"

      - name: Finalize manifest, upload changelogs and cleanup old versions
        env:
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: node apps/desktop/scripts/publish-update.mjs --manifest-only

  create-release:
    needs: [determine-mode, publish-finalize]
    if: always() && needs.publish-finalize.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: |
          VERSION="${{ needs.determine-mode.outputs.version }}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          if [[ "${{ needs.determine-mode.outputs.channel }}" == "beta" ]]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Read changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHANGELOG_FILE="apps/desktop/changelogs/${VERSION}/en.md"
          if [ -f "$CHANGELOG_FILE" ]; then
            sed '/^---$/,/^---$/d' "$CHANGELOG_FILE" > /tmp/release-notes.md
          else
            echo "Release v${VERSION}" > /tmp/release-notes.md
          fi

      - name: Download all platform artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: openloaf-desktop-*
          path: dist
          merge-multiple: true

      - name: Rename installers for release
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd dist
          # MacOS ARM64 → "MacOS"（Apple Silicon，用户友好名称）
          if [ -f "OpenLoaf-${VERSION}-MacOS-arm64.dmg" ]; then
            mv "OpenLoaf-${VERSION}-MacOS-arm64.dmg" "OpenLoaf-${VERSION}-MacOS.dmg"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"
          FILES=$(find dist -type f \( -name "*.dmg" -o -name "*.exe" -o -name "*.AppImage" \))
          PRERELEASE_FLAG=""
          if [[ "$PRERELEASE" == "true" ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          # 如果 release 已存在（tag 触发后重试），先删除再重建
          gh release delete "desktop@${VERSION}" --yes 2>/dev/null || true
          gh release create "desktop@${VERSION}" \
            --target "${{ github.sha }}" \
            --title "OpenLoaf Desktop v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            $PRERELEASE_FLAG \
            $FILES

  version-bump:
    needs: [determine-mode, create-release]
    # 只在 tag 触发的 stable 发布后 bump 版本（beta 和 workflow_dispatch 跳过）
    if: >-
      always() &&
      startsWith(github.ref, 'refs/tags/') &&
      needs.create-release.result == 'success' &&
      needs.determine-mode.outputs.channel == 'stable'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Bump patch version
        run: |
          cd apps/desktop
          npm version patch --no-git-tag-version
          cd ../server
          npm version patch --no-git-tag-version
          cd ../web
          npm version patch --no-git-tag-version

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DESKTOP_VERSION=$(node -p "require('./apps/desktop/package.json').version")
          SERVER_VERSION=$(node -p "require('./apps/server/package.json').version")
          WEB_VERSION=$(node -p "require('./apps/web/package.json').version")
          git add apps/desktop/package.json apps/server/package.json apps/web/package.json
          git commit -m "chore: bump version to desktop-v${DESKTOP_VERSION}, server-v${SERVER_VERSION}, web-v${WEB_VERSION} [skip ci]"
          git push origin main
