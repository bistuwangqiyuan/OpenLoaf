      agentType: browser
      prompt: "打开 example.com"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('open-url')
            ? { pass: true, score: 1, reason: '正确调用了 open-url' }
            : { pass: false, score: 0, reason: `未调用 open-url，实际: [${tools}]` };
      - type: javascript
        value: |
          const calls = context.providerResponse?.metadata?.toolCalls || [];
          const call = calls.find(t => t.toolName === 'open-url');
          if (!call) return { pass: false, score: 0, reason: '未找到 open-url 调用' };
          const url = call.args?.url ?? call.args?.href ?? '';
          return String(url).includes('example.com')
            ? { pass: true, score: 1, reason: `url=${url}` }
            : { pass: false, score: 0, reason: `url 应包含 example.com，实际: ${url}` };

