# OpenLoaf AI Agent E2E 行为测试
# 所有测试通过完整 AiExecuteService pipeline 运行（含 command 解析、skill 注入、Master Agent + ToolSearch）
#
# 运行方式: cd apps/server && pnpm run test:ai:behavior
# 查看结果: cd apps/server && pnpm run test:ai:behavior:view
# 按前缀过滤: --filter-pattern "cmd-"
# 模型对比: --model "profileId:modelId"（运行多次后在 UI 中对比）
# 缓存控制: 默认开启缓存加速迭代，--no-cache 强制刷新

description: "OpenLoaf AI Agent E2E 行为测试"

prompts:
  - "{{prompt}}"

providers:
  - id: file://openloaf-universal-provider.ts
    label: "Step 3.5"
    config:
      label: "Step 3.5"
      modelId: "cef4e784-32d6-4062-914d-f39b5534c20e:stepfun/step-3.5-flash:free"
  - id: file://openloaf-universal-provider.ts
    label: "Qwen3.5 Flash"
    config:
      label: "Qwen3.5 Flash"
      modelId: "9d8cc1ae-5376-43b1-a35f-948004b50086:qwen3.5-flash"

defaultTest:
  options:
    timeout: 90000
    provider:
      id: openai:chat:qwen3-235b-a22b
      config:
        apiBaseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
        apiKeyEnvar: PROMPTFOO_GRADING_API_KEY
  assert:
    # 全局延迟门槛 — 所有用例必须在 30 秒内完成
    - type: latency
      threshold: 30000
      weight: 0.5
      metric: response_time

# ── 聚合指标 ──────────────────────────────────────────────────
# 从测试用例断言的 metric 名称自动推导
derivedMetrics:
  - name: tool_accuracy
    value: tool_selection / (tool_selection + tool_selection_fail)
  - name: quality_rate
    value: output_quality / (output_quality + output_quality_fail)

tests:
  - file://tests/master/master.yaml
  - file://tests/calendar/calendar.yaml
  - file://tests/email/email.yaml
  - file://tests/tools/tools.yaml
  - file://tests/commands/commands.yaml
  # - file://tests/regression/regression.yaml  # 首个回归测试创建时启用
