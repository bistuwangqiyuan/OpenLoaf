      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('calendar-query')
          ? { pass: true, score: 1, reason: '调用了 calendar-query' }
          : { pass: false, score: 0, reason: `未调用 calendar-query，实际: [${tools}]` };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应提及今天日程的数量（如：没有日程、有N个日程）或列出具体日程内容"

