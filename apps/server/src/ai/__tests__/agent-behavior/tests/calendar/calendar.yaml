- description: "cal-007: 取消提醒应使用 calendar-mutate action=delete"
  vars:
    prompt: "取消今天的提醒"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'calendar-mutate');
        if (!call) return { pass: false, score: 0, reason: '未调用 calendar-mutate' };
        const action = call.args?.action;
        return (action === 'delete' || action === 'cancel')
          ? { pass: true, score: 1, reason: `action=${action}` }
          : { pass: false, score: 0, reason: `args.action 应为 delete/cancel，实际: ${action}` };

- description: "cal-008: 标记任务完成应使用 calendar-mutate"
  vars:
    prompt: "标记锻炼任务已完成"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'calendar-mutate');
        if (!call) return { pass: false, score: 0, reason: '未调用 calendar-mutate' };
        const action = call.args?.action;
