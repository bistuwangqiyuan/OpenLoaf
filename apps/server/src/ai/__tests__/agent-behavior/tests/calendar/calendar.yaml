# ════════════════════════════════════════════════════════════════
# Calendar 日历工具行为测试（Master E2E pipeline）
# ════════════════════════════════════════════════════════════════

- description: "cal-001: 列出日历源应使用 calendar-query mode=list-sources"
  vars:
    prompt: "列出我的日历源"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('calendar-query')
          ? { pass: true, score: 1, reason: '正确调用了 calendar-query' }
          : { pass: false, score: 0, reason: `未调用 calendar-query，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'calendar-query');
        if (!call) return { pass: false, score: 0, reason: '未找到 calendar-query 调用' };
        const mode = call.args?.mode;
        return mode === 'list-sources'
          ? { pass: true, score: 1, reason: `mode=${mode}` }
          : { pass: false, score: 0, reason: `args.mode 应为 list-sources，实际: ${mode}` };

- description: "cal-002: 今天日程查询 rangeStart 应存在"
  vars:
    prompt: "今天有什么日程"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('calendar-query')
          ? { pass: true, score: 1, reason: '正确调用了 calendar-query' }
          : { pass: false, score: 0, reason: `未调用 calendar-query，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'calendar-query');
        if (!call) return { pass: false, score: 0, reason: '未找到 calendar-query 调用' };
        const hasRange = call.args?.rangeStart != null;
        return hasRange
          ? { pass: true, score: 1, reason: 'rangeStart 存在' }
          : { pass: false, score: 0, reason: 'rangeStart 应存在（今日范围查询）' };

- description: "cal-003: 本周日程查询 rangeStart 和 rangeEnd 应同时存在"
  vars:
    prompt: "本周日程安排"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'calendar-query');
        if (!call) return { pass: false, score: 0, reason: '未调用 calendar-query' };
        const hasStart = call.args?.rangeStart != null;
        const hasEnd = call.args?.rangeEnd != null;
        return (hasStart && hasEnd)
          ? { pass: true, score: 1, reason: 'rangeStart 和 rangeEnd 均存在' }
          : { pass: false, score: 0, reason: `本周查询应有两端时间范围，rangeStart=${hasStart}, rangeEnd=${hasEnd}` };

- description: "cal-004: 下个月日程查询 rangeStart 应存在"
