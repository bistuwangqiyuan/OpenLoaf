          : { pass: false, score: 0, reason: `args.action 应为 toggle-completed/update，实际: ${action}` };

- description: "cal-009: 创建提醒应使用 calendar-mutate"
  vars:
    prompt: "创建一个每天提醒我喝水的提醒"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('calendar-mutate')
          ? { pass: true, score: 1, reason: '正确调用了 calendar-mutate' }
          : { pass: false, score: 0, reason: `未调用 calendar-mutate，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'calendar-mutate');
        if (!call) return { pass: false, score: 0, reason: '未找到 calendar-mutate 调用' };
        const kind = call.args?.kind;
        return (kind === 'reminder' || call.args?.action === 'create')
          ? { pass: true, score: 1, reason: `kind=${kind}, action=${call.args?.action}` }
          : { pass: false, score: 0, reason: `应创建提醒类型，kind=${kind}` };

- description: "cal-010: 日程数量查询应包含数量或列表信息"
