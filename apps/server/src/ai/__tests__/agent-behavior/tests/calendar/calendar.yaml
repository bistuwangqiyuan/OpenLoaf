- description: "cal-005: 创建会议事件应使用 calendar-mutate action=create"
  vars:
    prompt: "创建一个明天上午10点的会议"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('calendar-mutate')
          ? { pass: true, score: 1, reason: '正确调用了 calendar-mutate' }
          : { pass: false, score: 0, reason: `未调用 calendar-mutate，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'calendar-mutate');
        if (!call) return { pass: false, score: 0, reason: '未找到 calendar-mutate 调用' };
