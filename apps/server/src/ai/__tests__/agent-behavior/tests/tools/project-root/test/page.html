<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OpenLoaf 测试页面</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2rem auto; padding: 0 1rem; }
    h1 { color: #1a73e8; }
    .card { border: 1px solid #e0e0e0; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
  </style>
</head>
<body>
  <h1>OpenLoaf 产品介绍</h1>
  <p>OpenLoaf 是一个全栈 AI 生产力桌面应用，基于 Electron + Web 架构构建。</p>
  <div class="card">
    <h2>核心功能</h2>
    <ul>
      <li>富文本编辑（Plate.js）</li>
      <li>AI 多模型对话</li>
      <li>实时协作（Yjs）</li>
      <li>邮件与日历管理</li>
      <li>终端模拟与文件管理</li>
    </ul>
  </div>
  <div class="card">
    <h2>技术栈</h2>
    <p>Next.js + Hono + Prisma + SQLite，Turborepo monorepo + pnpm 管理。</p>
  </div>
</body>
</html>
