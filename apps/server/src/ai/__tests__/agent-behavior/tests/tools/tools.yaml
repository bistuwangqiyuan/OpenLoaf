# ════════════════════════════════════════════════════════════════
# Office 文档工具 — Word / PPTX / PDF / Excel 创建与编辑
# ════════════════════════════════════════════════════════════════

# ---- Word (word-query / word-mutate) ----

- description: "office-001: 创建 Word 文档应使用 word-mutate + action=create"
  vars:
    prompt: "创建一个 Word 文档 meeting-notes.docx，标题是「项目周会纪要」，包含三个段落：参会人员、讨论事项、行动计划"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('word-mutate')
          ? { pass: true, score: 1, reason: '正确调用了 word-mutate' }
          : { pass: false, score: 0, reason: `未调用 word-mutate，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'word-mutate');
        if (!call) return { pass: false, score: 0, reason: '未找到 word-mutate 调用' };
        const a = call.args ?? call.input;
        const action = a?.action;
        return action === 'create'
          ? { pass: true, score: 1, reason: 'action=create' }
          : { pass: false, score: 0, reason: `action 应为 create，实际: ${action}` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'word-mutate');
        if (!call) return { pass: false, score: 0, reason: '未找到 word-mutate 调用' };
        const a = call.args ?? call.input;
        const content = a?.content;
        return Array.isArray(content) && content.length >= 3
          ? { pass: true, score: 1, reason: `content 包含 ${content.length} 个元素` }
          : { pass: false, score: 0, reason: `content 应为数组且至少 3 个元素，实际: ${JSON.stringify(content)?.slice(0, 200)}` };

- description: "office-002: 读取 Word 文档结构应使用 word-query + mode=read-structure"
  vars:
    prompt: "查看 report.docx 的文档结构，有哪些段落和表格"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('word-query')
          ? { pass: true, score: 1, reason: '正确调用了 word-query' }
          : { pass: false, score: 0, reason: `未调用 word-query，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'word-query');
        if (!call) return { pass: false, score: 0, reason: '未找到 word-query 调用' };
        const a = call.args ?? call.input;
        const mode = a?.mode;
