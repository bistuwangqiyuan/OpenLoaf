# ════════════════════════════════════════════════════════════════
# 文件信息 — file-info 工具
# ════════════════════════════════════════════════════════════════

- description: "fileinfo-001: 查看图片分辨率应使用 file-info 或 image-process"
  vars:
    prompt: "这张图片的分辨率是多少？文件路径：photos/banner.png"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('file-info') || tools.includes('image-process')
          ? { pass: true, score: 1, reason: '调用了 file-info 或 image-process' }
          : { pass: false, score: 0, reason: `未调用 file-info 或 image-process，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('shell-command')
          ? { pass: true, score: 1, reason: '未使用 shell' }
          : { pass: false, score: 0, reason: '查看图片信息不应使用 shell-command' };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应包含图片的分辨率数据（宽x高像素），或指出文件未找到/不存在"

- description: "fileinfo-002: 查看视频时长应使用 file-info 或 video-convert"
  vars:
    prompt: "videos/demo.mp4 这个视频有多长？分辨率多少？"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('file-info') || tools.includes('video-convert')
          ? { pass: true, score: 1, reason: '调用了 file-info 或 video-convert' }
          : { pass: false, score: 0, reason: `未调用 file-info 或 video-convert，实际: [${tools}]` };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应包含视频时长和分辨率信息，或指出目标文件未找到/不存在（列出其他视频文件供用户选择也可接受）。不应编造数据"

- description: "fileinfo-003: 查看 PDF 页数应使用 file-info"
  vars:
    prompt: "report.pdf 有多少页？"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('file-info') || tools.includes('pdf-query')
          ? { pass: true, score: 1, reason: '调用了 file-info 或 pdf-query' }
          : { pass: false, score: 0, reason: `未调用 file-info 或 pdf-query，实际: [${tools}]` };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应包含 PDF 页数，或指出文件未找到/不存在/找不到（询问用户确认路径也可接受）。不应猜测页数"

- description: "fileinfo-004: 查看 Excel 有几个 sheet 应使用 file-info"
  vars:
    prompt: "data.xlsx 这个表格有几个 sheet？每个 sheet 叫什么？"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('file-info') || tools.includes('excel-query')
          ? { pass: true, score: 1, reason: '调用了 file-info 或 excel-query' }
          : { pass: false, score: 0, reason: `未调用 file-info 或 excel-query，实际: [${tools}]` };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应列出 sheet 名称，或指出文件未找到/不存在（列出类似文件并询问用户也可接受）"

- description: "fileinfo-005: 查看文件大小应使用 file-info 而非 shell"
  vars:
    prompt: "看看 output.zip 这个文件有多大"
  assert:
