        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('file-info') || tools.includes('list-dir')
          ? { pass: true, score: 1, reason: '调用了 file-info 或 list-dir' }
          : { pass: false, score: 0, reason: `未调用 file-info 或 list-dir，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return !tools.includes('shell-command')
