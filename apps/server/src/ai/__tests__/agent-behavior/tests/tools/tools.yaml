          ? { pass: true, score: 1, reason: 'action=sharpen' }
          : { pass: false, score: 0, reason: `action 应为 sharpen，实际: ${a?.action}` };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应确认锐化处理已完成，提及生成了新文件（含 _sharpen 后缀）或处理结果"

