      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'image-process');
        if (!call) return { pass: false, score: 0, reason: '未找到 image-process 调用' };
        const a = call.args ?? call.input;
