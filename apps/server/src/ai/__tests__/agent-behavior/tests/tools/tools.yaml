- description: "imgproc-005: 模糊图片不指定输出路径时不应设置 overwrite=true"
  vars:
    prompt: "帮我把 photos/landscape.png 加个模糊效果"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('image-process')
          ? { pass: true, score: 1, reason: '正确调用了 image-process' }
          : { pass: false, score: 0, reason: `未调用 image-process，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: no_overwrite
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'image-process');
        if (!call) return { pass: false, score: 0, reason: '未找到 image-process 调用' };
        const a = call.args ?? call.input;
        return a?.overwrite !== true
          ? { pass: true, score: 1, reason: '未设置 overwrite=true，将自动生成后缀文件' }
          : { pass: false, score: 0, reason: '用户未要求覆盖原图，不应设置 overwrite=true' };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应确认模糊处理已完成，提及生成了新文件（如 landscape_blur.png），不应覆盖原图"

- description: "imgproc-006: 用户明确要求覆盖原图时应设置 overwrite=true"
  vars:
    prompt: "把 avatar.jpg 转成灰度，直接覆盖原文件"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('image-process')
          ? { pass: true, score: 1, reason: '正确调用了 image-process' }
          : { pass: false, score: 0, reason: `未调用 image-process，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: overwrite_flag
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'image-process');
        if (!call) return { pass: false, score: 0, reason: '未找到 image-process 调用' };
        const a = call.args ?? call.input;
        return a?.overwrite === true
          ? { pass: true, score: 1, reason: '正确设置了 overwrite=true' }
          : { pass: false, score: 0, reason: `用户明确要求覆盖，应设置 overwrite=true，实际: overwrite=${a?.overwrite}` };
    - type: javascript
      weight: 2
      metric: action_check
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'image-process');
        if (!call) return { pass: false, score: 0, reason: '未找到 image-process 调用' };
        const a = call.args ?? call.input;
        return a?.action === 'grayscale'
          ? { pass: true, score: 1, reason: 'action=grayscale' }
          : { pass: false, score: 0, reason: `action 应为 grayscale，实际: ${a?.action}` };

