- description: "email-006: 发送邮件应使用 email-mutate action=send"
  vars:
    prompt: "发一封邮件给 test@example.com，内容是明天开会"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'email-mutate');
        if (!call) return { pass: false, score: 0, reason: '未调用 email-mutate' };
        const action = call.args?.action;
        return (action === 'send' || action === 'compose')
          ? { pass: true, score: 1, reason: `action=${action}` }
          : { pass: false, score: 0, reason: `args.action 应为 send，实际: ${action}` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'email-mutate');
        if (!call) return { pass: false, score: 0, reason: '未找到 email-mutate 调用' };
        const to = call.args?.to;
        return to != null
          ? { pass: true, score: 1, reason: `to=${JSON.stringify(to)}` }
          : { pass: false, score: 0, reason: 'args.to 应存在（收件人）' };

