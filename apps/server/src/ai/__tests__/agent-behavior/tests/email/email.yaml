# ════════════════════════════════════════════════════════════════
# Email 邮件工具行为测试（Master E2E pipeline）
# ════════════════════════════════════════════════════════════════

- description: "email-001: 列出邮件账户应使用 email-query mode=list-accounts"
  vars:
    prompt: "列出我的邮件账户"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'email-query');
        if (!call) return { pass: false, score: 0, reason: '未调用 email-query' };
        return call.args?.mode === 'list-accounts'
          ? { pass: true, score: 1, reason: 'mode=list-accounts' }
          : { pass: false, score: 0, reason: `args.mode 应为 list-accounts，实际: ${call.args?.mode}` };

- description: "email-002: 收件箱查询应使用 email-query"
  vars:
    prompt: "查看收件箱邮件"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('email-query')
          ? { pass: true, score: 1, reason: '正确调用了 email-query' }
          : { pass: false, score: 0, reason: `未调用 email-query，实际: [${tools}]` };
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'email-query');
        if (!call) return { pass: false, score: 0, reason: '未找到 email-query 调用' };
        const mode = call.args?.mode;
        const valid = ['list-messages', 'list-unified', 'list'].includes(mode);
        return valid
          ? { pass: true, score: 1, reason: `mode=${mode}` }
          : { pass: false, score: 0, reason: `args.mode 应为 list-messages/list-unified，实际: ${mode}` };

- description: "email-003: 未读邮件统计应使用 email-query"
  vars:
    prompt: "有多少未读邮件"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const tools = context.providerResponse?.metadata?.toolNames || [];
        return tools.includes('email-query')
          ? { pass: true, score: 1, reason: '正确调用了 email-query' }
          : { pass: false, score: 0, reason: `未调用 email-query，实际: [${tools}]` };
    - type: llm-rubric
      weight: 1
      metric: output_quality
      value: "回复应提及未读邮件数量或说明无法获取"

- description: "email-004: 邮件搜索应传入搜索关键词参数"
  vars:
    prompt: "搜索标题含「会议」的邮件"
  assert:
    - type: javascript
      weight: 2
      metric: tool_selection
      value: |
        const calls = context.providerResponse?.metadata?.toolCalls || [];
        const call = calls.find(t => t.toolName === 'email-query');
        if (!call) return { pass: false, score: 0, reason: '未调用 email-query' };
        const hasQuery = call.args?.query != null || call.args?.keyword != null || call.args?.subject != null;
        return hasQuery
          ? { pass: true, score: 1, reason: '搜索关键词参数存在' }
          : { pass: false, score: 0, reason: '应传入搜索关键词参数' };

- description: "email-005: 获取邮件详情应使用 email-query"
