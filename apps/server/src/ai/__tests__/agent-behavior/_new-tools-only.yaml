# 新工具行为测试（仅 file-info, image-process, video-convert, doc-convert）
description: "新工具 E2E 测试"

prompts:
  - "{{prompt}}"

providers:
  - id: file://openloaf-universal-provider.ts
    label: "OpenLoaf Universal"

defaultTest:
  options:
    timeout: 90000
    provider:
      id: openai:chat:qwen-plus
      config:
        apiBaseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
        apiKeyEnvar: PROMPTFOO_GRADING_API_KEY

tests:
  # ═══ file-info ═══
  - description: "fileinfo-001: 查看图片分辨率应使用 file-info"
    vars:
      prompt: "这张图片的分辨率是多少？文件路径：photos/banner.png"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('file-info')
            ? { pass: true, score: 1, reason: '正确调用了 file-info' }
            : { pass: false, score: 0, reason: `未调用 file-info，实际: [${tools}]` };
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          const forbidden = ['image-process', 'read-file'];
          const used = forbidden.filter(t => tools.includes(t));
          return used.length === 0
            ? { pass: true, score: 1, reason: '未使用不必要的工具' }
            : { pass: false, score: 0, reason: `查看信息不应使用 ${used.join(', ')}` };

  - description: "fileinfo-002: 查看视频时长应使用 file-info"
    vars:
      prompt: "videos/demo.mp4 这个视频有多长？分辨率多少？"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('file-info')
            ? { pass: true, score: 1, reason: '正确调用了 file-info' }
            : { pass: false, score: 0, reason: `未调用 file-info，实际: [${tools}]` };

  - description: "fileinfo-003: 查看 PDF 页数应使用 file-info"
    vars:
      prompt: "report.pdf 有多少页？"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('file-info') || tools.includes('pdf-query')
            ? { pass: true, score: 1, reason: '调用了 file-info 或 pdf-query' }
            : { pass: false, score: 0, reason: `未调用 file-info 或 pdf-query，实际: [${tools}]` };

  - description: "fileinfo-004: 查看 Excel 有几个 sheet 应使用 file-info"
    vars:
      prompt: "data.xlsx 这个表格有几个 sheet？每个 sheet 叫什么？"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('file-info') || tools.includes('excel-query')
            ? { pass: true, score: 1, reason: '调用了 file-info 或 excel-query' }
            : { pass: false, score: 0, reason: `未调用 file-info 或 excel-query，实际: [${tools}]` };

  - description: "fileinfo-005: 查看文件大小应使用 file-info 而非 shell"
    vars:
      prompt: "看看 output.zip 这个文件有多大"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('file-info') || tools.includes('list-dir')
            ? { pass: true, score: 1, reason: '调用了 file-info 或 list-dir' }
            : { pass: false, score: 0, reason: `未调用 file-info 或 list-dir，实际: [${tools}]` };
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return !tools.includes('shell-command')
            ? { pass: true, score: 1, reason: '未使用 shell' }
            : { pass: false, score: 0, reason: '查看文件大小不应使用 shell-command' };

  # ═══ image-process ═══
  - description: "imgproc-001: 缩小图片应使用 image-process"
    vars:
      prompt: "把 photos/banner.png 缩小到 800x600"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('image-process')
            ? { pass: true, score: 1, reason: '正确调用了 image-process' }
            : { pass: false, score: 0, reason: `未调用 image-process，实际: [${tools}]` };

  - description: "imgproc-002: PNG 转 WebP 应使用 image-process"
    vars:
      prompt: "把 logo.png 转成 WebP 格式，保存到 logo.webp"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('image-process')
            ? { pass: true, score: 1, reason: '正确调用了 image-process' }
            : { pass: false, score: 0, reason: `未调用 image-process，实际: [${tools}]` };

  - description: "imgproc-003: 旋转图片应使用 image-process"
    vars:
      prompt: "把 photo.jpg 顺时针旋转 90 度"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('image-process')
            ? { pass: true, score: 1, reason: '正确调用了 image-process' }
            : { pass: false, score: 0, reason: `未调用 image-process，实际: [${tools}]` };

  - description: "imgproc-004: 查看图片尺寸应使用 file-info 或 image-process"
    vars:
      prompt: "看一下 cover.jpg 的宽高是多少"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('file-info') || tools.includes('image-process')
            ? { pass: true, score: 1, reason: '调用了 file-info 或 image-process' }
            : { pass: false, score: 0, reason: `未调用 file-info 或 image-process，实际: [${tools}]` };

  # ═══ video-convert ═══
  - description: "vidconv-001: 视频转格式应使用 video-convert"
    vars:
      prompt: "把 recording.mp4 转成 WebM 格式，保存到 recording.webm"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('video-convert')
            ? { pass: true, score: 1, reason: '正确调用了 video-convert' }
            : { pass: false, score: 0, reason: `未调用 video-convert，实际: [${tools}]` };

  - description: "vidconv-002: 从视频提取音频应使用 video-convert"
    vars:
      prompt: "从 meeting.mp4 中提取音频，保存为 meeting.mp3"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('video-convert')
            ? { pass: true, score: 1, reason: '正确调用了 video-convert' }
            : { pass: false, score: 0, reason: `未调用 video-convert，实际: [${tools}]` };

  - description: "vidconv-003: 查看视频信息应使用 file-info 或 video-convert"
    vars:
      prompt: "video.mp4 这个视频文件的编码格式是什么？时长多少？"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('file-info') || tools.includes('video-convert')
            ? { pass: true, score: 1, reason: '调用了 file-info 或 video-convert' }
            : { pass: false, score: 0, reason: `未调用相关工具，实际: [${tools}]` };

  - description: "vidconv-004: 音频格式转换应使用 video-convert"
    vars:
      prompt: "把 audio/speech.wav 转成 mp3 格式，保存到 audio/speech.mp3"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('video-convert')
            ? { pass: true, score: 1, reason: '正确调用了 video-convert' }
            : { pass: false, score: 0, reason: `未调用 video-convert，实际: [${tools}]` };

  # ═══ doc-convert ═══
  - description: "docconv-001: Markdown 转 PDF 应使用 doc-convert"
    vars:
      prompt: "把 docs/report.md 转成 PDF，保存到 docs/report.pdf"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('doc-convert')
            ? { pass: true, score: 1, reason: '正确调用了 doc-convert' }
            : { pass: false, score: 0, reason: `未调用 doc-convert，实际: [${tools}]` };

  - description: "docconv-002: PDF 转 Word 应使用 doc-convert"
    vars:
      prompt: "把 contract.pdf 转成 Word 文档"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('doc-convert')
            ? { pass: true, score: 1, reason: '正确调用了 doc-convert' }
            : { pass: false, score: 0, reason: `未调用 doc-convert，实际: [${tools}]` };

  - description: "docconv-003: CSV 转 Excel 应使用 doc-convert"
    vars:
      prompt: "把 data/sales.csv 转成 Excel 格式"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('doc-convert')
            ? { pass: true, score: 1, reason: '正确调用了 doc-convert' }
            : { pass: false, score: 0, reason: `未调用 doc-convert，实际: [${tools}]` };

  - description: "docconv-004: HTML 转 Markdown 应使用 doc-convert"
    vars:
      prompt: "把 page.html 转成 Markdown 格式，保存到 page.md"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('doc-convert')
            ? { pass: true, score: 1, reason: '正确调用了 doc-convert' }
            : { pass: false, score: 0, reason: `未调用 doc-convert，实际: [${tools}]` };

  - description: "docconv-005: 读取 PDF 内容不应使用 doc-convert"
    vars:
      prompt: "读取 report.pdf 的内容给我看看"
    assert:
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return !tools.includes('doc-convert')
            ? { pass: true, score: 1, reason: '正确：未使用 doc-convert 读取内容' }
            : { pass: false, score: 0, reason: 'doc-convert 用于格式转换，不应用于读取内容' };
      - type: javascript
        value: |
          const tools = context.providerResponse?.metadata?.toolNames || [];
          return tools.includes('pdf-query') || tools.includes('read-file')
            ? { pass: true, score: 1, reason: '使用了正确的读取工具' }
            : { pass: false, score: 0, reason: `应使用 pdf-query 或 read-file 读取，实际: [${tools}]` };
